name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    if: "github.event_name == 'pull_request' || !contains(github.event.head_commit.message || '', 'chore(main): release')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
